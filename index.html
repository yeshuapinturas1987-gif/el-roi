<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El-Roi | O Deus que me vê</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* BASE */
body{
    font-family:'Inter',sans-serif;
    background:#050505;
    color:white;
    transition:0.3s;
}

h1,h2,h3{
    font-family:'Playfair Display',serif;
}

/* NAVBAR */
header{
    position:fixed;
    width:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(15px);
    padding:15px;
    text-align:center;
    z-index:999;
}

header h1{
    color:gold;
}

nav a{
    margin:10px;
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* HERO */
.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1504052434569-70ad5836ab65') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h2{
    font-size:2.8rem;
}

/* SECTIONS */
.section{
    padding:80px 20px;
    text-align:center;
}

/* CRUZ */
.cruz{
    background:
    linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1520975916090-3105956dac38') center/cover;
}

/* SEPULCRO */
.sepulcro{
    background:
    linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1608889175512-1b0b1cbdc8c2') center/cover;
}

/* CARD */
.card{
    background:#111;
    padding:20px;
    border-radius:15px;
    margin:15px auto;
    max-width:400px;
}

/* BOTÃO */
button{
    background:gold;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
    margin-top:10px;
}

/* INPUT */
textarea,input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:10px;
}

/* ORAÇÃO LISTA */
.post{
    background:#1a1a1a;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

/* FOOTER */
footer{
    padding:20px;
    text-align:center;
    border-top:1px solid #222;
}

/* DARK MODE */
.light{
    background:#f5f5f5;
    color:black;
}

</style>
</head>

<body>

<header>
    <h1>El-Roi</h1>
    <nav>
        <a href="#">Início</a>
        <a href="#">Estudos</a>
        <a href="#">Bíblia</a>
        <a href="#">Oração</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h2>Você nunca está fora do olhar de Deus</h2>
</section>

<!-- VERSÍCULO -->
<section class="section">
    <h3>📖 Versículo do Dia</h3>
    <p id="versiculo"></p>
</section>

<!-- CRUZ -->
<section class="section cruz">
    <h3>✝️ A Cruz Está Vazia</h3>
    <p>O sacrifício foi completo.</p>
</section>

<!-- SEPULCRO -->
<section class="section sepulcro">
    <h3>🪨 O Sepulcro Está Vazio</h3>
    <p>Ele vive.</p>
</section>

<!-- LOGIN -->
<section class="section">
    <h3>👤 Área do Usuário</h3>
    <div class="card">
        <input id="nome" placeholder="Seu nome">
        <button onclick="login()">Entrar</button>
        <p id="usuario"></p>
    </div>
</section>

<!-- ORAÇÃO -->
<section class="section">
    <h3>🙏 Muro de Oração</h3>
    <div class="card">
        <textarea id="pedido" placeholder="Digite seu pedido"></textarea>
        <button onclick="postar()">Enviar</button>
        <div id="lista"></div>
    </div>
</section>

<footer>
    <button onclick="modo()">Modo Claro/Escuro</button>
    <p>© El-Roi 2026</p>
</footer>

<script>

/* VERSÍCULO AUTOMÁTICO */
const versiculos=[
"Salmos 23:1 - O Senhor é meu pastor",
"Isaías 41:10 - Não temas",
"Filipenses 4:13 - Tudo posso",
"Jeremias 29:11 - Planos de paz"
];

function versiculoDia(){
    const dia=new Date().getDate();
    document.getElementById("versiculo").innerText=
    versiculos[dia % versiculos.length];
}
versiculoDia();

/* LOGIN */
function login(){
    const nome=document.getElementById("nome").value;
    localStorage.setItem("user",nome);
    document.getElementById("usuario").innerText="Bem-vindo, "+nome;
}

/* ORAÇÃO */
function postar(){
    const texto=document.getElementById("pedido").value;
    let posts=JSON.parse(localStorage.getItem("posts")||"[]");
    posts.push(texto);
    localStorage.setItem("posts",JSON.stringify(posts));
    carregar();
}

function carregar(){
    let posts=JSON.parse(localStorage.getItem("posts")||"[]");
    let html="";
    posts.forEach(p=>{
        html+="<div class='post'>🙏 "+p+"</div>";
    });
    document.getElementById("lista").innerHTML=html;
}
carregar();

/* DARK MODE */
function modo(){
    document.body.classList.toggle("light");
}

</script>

</body>
</html>
